name: skyb

num_nodes: 2

resources:
  cloud: aws
  accelerators: T4:4
  disk_size: 200

envs:
  BUCKET: image.data          # your S3 bucket name
  DATASET_S3: PC              # path inside bucket for the dataset
  DATA_DIR: /home/ubuntu/data/dataset
  OUTPUT_DIR: /home/ubuntu/data/output
  MODEL: resnet50
  N_TRIALS: "30"
  EPOCHS: "30"
  RESUME_PATH: ""             # set via --env RESUME_PATH=s3://... to warm-start

setup: |
  curl -LsSf https://astral.sh/uv/install.sh | sh
  source $HOME/.local/bin/env
  uv venv ~/venv
  uv pip install --python ~/venv/bin/python -r ~/sky_workdir/requirements.txt awscli
  mkdir -p $DATA_DIR && ~/venv/bin/aws s3 sync s3://$BUCKET/$DATASET_S3 $DATA_DIR

run: |
  mkdir -p $OUTPUT_DIR

  RESUME_ARG=""
  if [ -n "$RESUME_PATH" ]; then
    RESUME_ARG="--resume $RESUME_PATH"
  fi

  ~/venv/bin/python ~/sky_workdir/runic.py \
    --data        $DATA_DIR \
    --model       $MODEL \
    --n_trials    $N_TRIALS \
    --epochs      $EPOCHS \
    --output      $OUTPUT_DIR/runic_results.json \
    --ray-storage s3://$BUCKET/ray-results/two_nodes \
    --device      auto \
    $RESUME_ARG

  # Copy final results JSON back to S3
  ~/venv/bin/aws s3 cp $OUTPUT_DIR/runic_results.json s3://$BUCKET/ray-results/two_nodes/runic_results.json

workdir: /home/ljubomir/github/runic
