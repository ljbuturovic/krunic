name: skya

resources:
  cloud: aws
  accelerators: T4:4          # 4× T4 = g4dn.12xlarge; change to A10G:4 for g5.12xlarge
  disk_size: 200

envs:
  BUCKET: image.data          # your S3 bucket name
  DATASET_S3: PC              # path inside bucket for the dataset
  DATA_DIR: /data/dataset
  OUTPUT_DIR: /data/output
  MODEL: resnet50
  N_TRIALS: "80"
  EPOCHS: "30"
  RESUME_PATH: ""             # set via --env RESUME_PATH=s3://... to warm-start

file_mounts:
  /data/dataset:
    source: s3://image.data/PC
    mode: COPY

run: |
  python -m pip install \
    "numpy<2" \
    "torch==2.3.1" "torchvision==0.18.1" \
    timm \
    "ray[tune,train]==2.9.3" "pyarrow==14.0.2" optuna \
    scikit-learn pyyaml tqdm pillow awscli

  mkdir -p $OUTPUT_DIR

  RESUME_ARG=""
  if [ -n "$RESUME_PATH" ]; then
    RESUME_ARG="--resume $RESUME_PATH"
  fi

  python ~/sky_workdir/runic.py \
    --data        $DATA_DIR \
    --model       $MODEL \
    --n_trials    $N_TRIALS \
    --epochs      $EPOCHS \
    --output      $OUTPUT_DIR/runic_results.json \
    --ray-storage s3://$BUCKET/ray-results \
    --device      auto \
    $RESUME_ARG

  # Copy final results JSON back to S3
  aws s3 cp $OUTPUT_DIR/runic_results.json s3://$BUCKET/ray-results/runic_results.json

workdir: /home/ljubomir/github/tunic
